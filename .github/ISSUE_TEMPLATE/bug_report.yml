name: Bug report
description: Report a false positive, false negative, or broken behavior in the skill
title: "[Bug] "
labels: ["bug", "triage"]
body:
  - type: textarea
    id: description
    attributes:
      label: What happened
      description: What did the skill do? What did you expect it to do?
      placeholder: The skill flagged X as a P4 violation, but X is a verified claim in provenFacts.
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Minimal reproduction
      description: Paste a minimal ritual.config.json and the content that triggered the issue.
      render: markdown
    validations:
      required: true
  - type: textarea
    id: output
    attributes:
      label: Skill output
      description: The full report the skill generated.
      render: text
  - type: dropdown
    id: mode
    attributes:
      label: Mode
      options:
        - flag
        - suggest
        - fix
    validations:
      required: true
  - type: dropdown
    id: priority
    attributes:
      label: Which priority was involved?
      options:
        - P1 — Stale stats
        - P2 — Missing specificity
        - P3 — AI-slop markers
        - P4 — Hype words
        - P5 — Name/attribution mismatches
        - P6 — Generic corporate voice
        - Not priority-specific
    validations:
      required: true
