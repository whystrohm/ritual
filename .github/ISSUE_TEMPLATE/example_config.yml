name: Example config contribution
description: Contribute an example ritual.config.json for a niche or industry
title: "[Example] "
labels: ["example", "enhancement"]
body:
  - type: input
    id: niche
    attributes:
      label: Niche / industry
      placeholder: SaaS, DTC, real estate, recovery, healthcare, etc.
    validations:
      required: true
  - type: textarea
    id: why
    attributes:
      label: Why this niche needs its own example
      description: What's specific about voice in this space? What hype words or patterns are uniquely relevant?
    validations:
      required: true
  - type: textarea
    id: config
    attributes:
      label: Proposed config
      description: Paste the ritual.config.json you'd contribute.
      render: json
    validations:
      required: true
  - type: checkboxes
    id: checklist
    attributes:
      label: Checklist
      options:
        - label: Config validates against the schema in docs/config-schema.md
        - label: All provenFacts include verifiable sources
        - label: No proprietary brand data included
